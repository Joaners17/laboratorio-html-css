<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Tu Nombre</h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="proyectos.html">Proyectos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor">
        <section id="contacto">
            <h2>Ponte en contacto</h2>
            
            <form action="#" method="POST" class="formulario-contacto">
                <fieldset>
                    <legend>Datos Personales</legend>

                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Escribe tu nombre">

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="8888-8888">

                    <label for="fecha-nac">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha-nac" name="fecha-nac">

                    <label for="pais">País:</label>
                    <select id="pais" name="pais">
                        <option value="cr">Costa Rica</option>
                        <option value="mx">México</option>
                        <option value="co">Colombia</option>
                    </select>

                    <p>Interés Principal:</p>
                    <div class="opciones-inline">
                        <input type="radio" id="desarrollo" name="interes" value="desarrollo" checked>
                        <label for="desarrollo">Desarrollo Web</label>
                        
                        <input type="radio" id="bases-datos" name="interes" value="bases-datos">
                        <label for="bases-datos">Bases de Datos</label>
                    </div>

                    <label for="mensaje">Mensaje o propuesta:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="¿En qué puedo ayudarte?"></textarea>

                    <div class="checkbox-inline">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label for="terminos">Acepto los términos y condiciones de privacidad.</label>
                    </div>

                    <div class="botones-form">
                        <button type="submit" class="btn">Enviar Formulario</button>
                        <button type="reset" class="btn btn-reset">Limpiar</button>
                    </div>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-col"><h3>Ubicación</h3><p>Liberia, Guanacaste</p></div>
        <div class="footer-col"><h3>Contacto</h3><p>tu.correo@email.com</p></div>
        <div class="footer-col"><h3>Copyright</h3><p>&copy; 2026</p></div>
    </footer>

</body>
</html>
